# Single entry point: serves the board and proxies all backend routes
# Point ngrok/domain to port 80 of this container only (including the LINE webhook)
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: all other paths are handled by React
  location / {
    try_files $uri /index.html;
  }

  location /tasks {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
  }

  location /health {
    proxy_pass http://backend:3000;
  }

  # LINE posts webhooks here — body is forwarded raw so the backend can verify the signature
  location /webhook {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
  }

  # WebSocket proxy for socket.io
  location /socket.io/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}
