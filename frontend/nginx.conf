# URL เดียวจบ: เสิร์ฟบอร์ด + proxy ทุกอย่างที่เป็นของ backend
# → ngrok/โดเมนชี้มาที่ port 80 ของ container นี้ที่เดียว (รวม LINE webhook ด้วย)
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: เส้นทางอื่นๆ ให้ React จัดการ
  location / {
    try_files $uri /index.html;
  }

  location /tasks {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
  }

  location /health {
    proxy_pass http://backend:3000;
  }

  # LINE ยิงเข้าที่นี่ — body ต้องส่งผ่านดิบๆ ให้ backend ตรวจ signature เอง
  location /webhook {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
  }

  # WebSocket ของ socket.io
  location /socket.io/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}
