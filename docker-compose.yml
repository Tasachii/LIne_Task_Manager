services:
  db:
    image: postgres:16-alpine
    container_name: ltm_postgres
    environment:
      POSTGRES_USER: line
      POSTGRES_PASSWORD: line
      POSTGRES_DB: line_task_manager
    ports:
      - "5432:5432"
    volumes:
      - ltm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U line -d line_task_manager"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Start the full stack (db + backend + frontend): docker compose --profile full up -d --build
  backend:
    profiles: ["full"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ltm_backend
    env_file:
      - backend/.env # place LINE_CHANNEL_SECRET / LINE_CHANNEL_ACCESS_TOKEN / BOARD_PASSWORD here
    environment:
      # Override to point at the db service inside the compose network (overrides localhost value in .env)
      DATABASE_URL: postgres://line:line@db:5432/line_task_manager
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  # Board + reverse proxy — expose a single public URL on :8080 (includes LINE's /webhook)
  frontend:
    profiles: ["full"]
    build:
      context: frontend
    container_name: ltm_frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ltm_pgdata:
