services:
  db:
    image: postgres:16-alpine
    container_name: ltm_postgres
    environment:
      POSTGRES_USER: line
      POSTGRES_PASSWORD: line
      POSTGRES_DB: line_task_manager
    ports:
      - "5432:5432"
    volumes:
      - ltm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U line -d line_task_manager"]
      interval: 3s
      timeout: 3s
      retries: 10

  # backend จะรัน migration เองตอน start — ใช้ profile "full" จะได้ไม่บังคับ build ตอน dev ที่รันแค่ db
  # เปิดทั้งชุด: docker compose --profile full up -d --build
  backend:
    profiles: ["full"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ltm_backend
    env_file:
      - backend/.env # ใส่ LINE_CHANNEL_SECRET / LINE_CHANNEL_ACCESS_TOKEN ที่นี่
    environment:
      # override ให้ชี้ไป db ใน network ของ compose (ทับค่าใน .env ที่ชี้ localhost)
      DATABASE_URL: postgres://line:line@db:5432/line_task_manager
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  ltm_pgdata:
